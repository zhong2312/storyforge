<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0d1420"/>
    </linearGradient>
    <linearGradient id="field-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <marker id="arr-b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#3b82f6" opacity="0.8"/>
    </marker>
    <marker id="arr-p" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#8b5cf6" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Header -->
  <text x="60" y="46" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#3b82f6" letter-spacing="3" font-weight="600">设 定 库 · 世 界 观</text>
  <text x="60" y="80" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="32" fill="#f1f5f9" font-weight="800">从世界起源到人文格局——层层递进，互相引用</text>
  <text x="60" y="106" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#475569">每一步的 AI 生成都引用上一步的内容，保证世界内部逻辑自洽</text>
  <line x1="60" y1="120" x2="800" y2="120" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- ===== CARD 1: World Origin ===== -->
  <rect x="60" y="136" width="330" height="438" rx="12" fill="url(#card-bg)" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Card header -->
  <rect x="60" y="136" width="330" height="52" rx="12" fill="#0f2040"/>
  <rect x="60" y="166" width="330" height="22" fill="#0f2040"/>
  <text x="84" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#60a5fa">🌌</text>
  <text x="108" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#93c5fd" font-weight="700">世界起源</text>
  <text x="255" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">3 字段 · AI 生成</text>

  <!-- Field 1: 世界来源 -->
  <text x="80" y="214" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">世界来源</text>
  <rect x="80" y="220" width="290" height="70" rx="6" fill="url(#field-bg)" stroke="#1e3a5f"/>
  <text x="96" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">上古神纪时代，天地混沌初开。盘古之神以</text>
  <text x="96" y="257" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">身殒道，化为山川江海。神血落地之处，生</text>
  <text x="96" y="274" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">出最初的灵脉，万物由此得以汲灵修行。</text>

  <!-- Field 2: 力量层次 -->
  <text x="80" y="312" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">力量层次</text>
  <rect x="80" y="318" width="290" height="84" rx="6" fill="url(#field-bg)" stroke="#1e3a5f"/>
  <text x="96" y="338" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">修炼共九境：</text>
  <text x="96" y="354" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#93c5fd">炼气→筑基→金丹→元婴→化神</text>
  <text x="96" y="370" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#93c5fd">→合体→大乘→渡劫→飞升</text>
  <text x="96" y="388" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#64748b">飞升后不再属于此界，化为新的神明。</text>

  <!-- Field 3: 神明设定 -->
  <text x="80" y="424" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">神明设定</text>
  <rect x="80" y="430" width="290" height="70" rx="6" fill="url(#field-bg)" stroke="#1e3a5f"/>
  <text x="96" y="450" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">天道神君三位，不直接干涉凡界。护法神</text>
  <text x="96" y="466" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">将二十四位，掌各方灵脉守护。神明之间</text>
  <text x="96" y="482" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">有盟约，不可随意降临凡界干预。</text>

  <!-- Step label -->
  <rect x="80" y="516" width="290" height="44" rx="6" fill="#0a1628" stroke="#1e3a5f"/>
  <text x="225" y="535" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#3b82f6">Step 1 完成后 → 作为 context 传入 Step 2</text>
  <text x="225" y="550" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">AI 生成地理时已知：灵脉分布逻辑</text>

  <!-- Arrow 1→2 -->
  <line x1="390" y1="355" x2="418" y2="355" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="404" y="347" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#3b82f6">引用</text>

  <!-- ===== CARD 2: Natural Env ===== -->
  <rect x="420" y="136" width="330" height="438" rx="12" fill="url(#card-bg)" stroke="#1e4030" stroke-width="1.5"/>
  <rect x="420" y="136" width="330" height="52" rx="12" fill="#0a2010"/>
  <rect x="420" y="166" width="330" height="22" fill="#0a2010"/>
  <text x="444" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#4ade80">🏔</text>
  <text x="468" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#6ee7b7" font-weight="700">自然环境</text>
  <text x="612" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#166534">11 字段 · 引用世界起源</text>

  <!-- Field: 世界结构 -->
  <text x="440" y="214" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">世界结构</text>
  <rect x="440" y="220" width="290" height="54" rx="6" fill="url(#field-bg)" stroke="#1e4030"/>
  <text x="456" y="240" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">三界结构：天界（神明居所）/ 人界（修士</text>
  <text x="456" y="257" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">凡人）/ 幽冥（亡灵阴魂）。人界有四大洲。</text>

  <!-- Field: 大陆分布 -->
  <text x="440" y="294" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">大陆分布</text>
  <rect x="440" y="300" width="290" height="68" rx="6" fill="url(#field-bg)" stroke="#1e4030"/>
  <text x="456" y="320" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">东洲·苍云大陆（修仙大宗聚集）</text>
  <text x="456" y="336" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">西洲·炎荒之地（丹药炼器圣地）</text>
  <text x="456" y="352" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">南洲·瀛洲群岛（海修与蛟族盘踞）</text>

  <!-- Field: 灵脉分布（引用世界起源！） -->
  <text x="440" y="390" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">灵脉分布</text>
  <rect x="440" y="396" width="290" height="70" rx="6" fill="#0a1a0a" stroke="#166534" stroke-width="1.5"/>
  <!-- 引用标记 -->
  <rect x="440" y="396" width="290" height="18" rx="4" fill="#0f2a10"/>
  <text x="456" y="409" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="9.5" fill="#4ade80">↑ 引用"世界起源·神血落地之处生灵脉"</text>
  <text x="456" y="426" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">主灵脉九条，以苍云大陆中心山脉为枢纽</text>
  <text x="456" y="442" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">向四洲辐射，灵气浓薄决定修炼速度。</text>

  <!-- Step label -->
  <rect x="440" y="482" width="290" height="78" rx="6" fill="#0a1628" stroke="#1e3a5f"/>
  <text x="585" y="501" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#3b82f6">Step 2 完成后 → 传入 Step 3</text>
  <text x="585" y="517" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">地理格局 → 人文势力才能合理分布</text>
  <text x="585" y="533" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">灵脉走向 → 各宗门选址有依据</text>
  <text x="585" y="549" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">气候差异 → 各地文化风俗有根源</text>

  <!-- Arrow 2→3 -->
  <line x1="750" y1="355" x2="778" y2="355" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arr-p)"/>
  <text x="764" y="347" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="10" fill="#8b5cf6">引用</text>

  <!-- ===== CARD 3: Humanity ===== -->
  <rect x="780" y="136" width="360" height="438" rx="12" fill="url(#card-bg)" stroke="#2d1b4e" stroke-width="1.5"/>
  <rect x="780" y="136" width="360" height="52" rx="12" fill="#170d30"/>
  <rect x="780" y="166" width="360" height="22" fill="#170d30"/>
  <text x="804" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#a78bfa">🏛</text>
  <text x="828" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#c4b5fd" font-weight="700">人文环境</text>
  <text x="985" y="168" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#5b21b6">7 字段 · 引用前两步</text>

  <!-- Field: 势力分布 with reference -->
  <text x="800" y="214" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">势力分布</text>
  <rect x="800" y="220" width="320" height="82" rx="6" fill="#0f0a1f" stroke="#2d1b4e" stroke-width="1.5"/>
  <rect x="800" y="220" width="320" height="18" rx="4" fill="#1a0d35"/>
  <text x="816" y="233" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="9.5" fill="#a78bfa">↑ 引用"大陆分布·灵脉走向·修炼境界"</text>
  <text x="816" y="252" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">苍云大陆三大宗门：天剑宗（主灵脉处）</text>
  <text x="816" y="268" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">万药谷（灵草聚集地）/ 玄冥海（海修）</text>
  <text x="816" y="284" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">散修联盟·妖族·上古遗族三方角力。</text>

  <!-- Field: 核心矛盾 -->
  <text x="800" y="324" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">核心矛盾冲突</text>
  <rect x="800" y="330" width="320" height="68" rx="6" fill="url(#field-bg)" stroke="#2d1b4e"/>
  <text x="816" y="350" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">神明盟约即将到期，天道失衡，灵脉枯竭</text>
  <text x="816" y="366" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">迹象显现。三大宗门暗中争夺上古神器</text>
  <text x="816" y="382" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">以图在变局中占据主导地位。</text>

  <!-- Field: 历史大事记 -->
  <text x="800" y="420" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#64748b">历史大事记</text>
  <rect x="800" y="426" width="320" height="68" rx="6" fill="url(#field-bg)" stroke="#2d1b4e"/>
  <text x="816" y="445" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">三千年前：上古大战，神明陨落九成</text>
  <text x="816" y="461" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">一千五百年前：天道盟约签订，乱世终</text>
  <text x="816" y="477" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11.5" fill="#cbd5e1">当前：盟约将至，新一轮乱世在酝酿...</text>

  <!-- Next arrow label -->
  <rect x="800" y="510" width="320" height="50" rx="6" fill="#0a1628" stroke="#1e3a5f"/>
  <text x="960" y="528" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#3b82f6">三模块合并 → 传入故事设计 + 角色生成</text>
  <text x="960" y="545" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#1e40af">主角的冲突，与"灵脉枯竭"挂钩才成立</text>

  <!-- Bottom bar -->
  <rect x="0" y="594" width="1200" height="36" fill="#050810"/>
  <text x="600" y="617" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="12" fill="#334155">故事熔炉 StoryForge · 设定库 · 你建的世界，是 AI 后续所有生成的基础</text>
</svg>
