<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d18"/>
      <stop offset="100%" style="stop-color:#0f1623"/>
    </linearGradient>
    <linearGradient id="sf-col" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="other-col" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1020"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#f1f5f9" font-weight="700">故事熔炉 vs 普通 AI 写作工具</text>
  <text x="600" y="78" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">核心差异：提示词透明度 · 本地数据 · 无供应商绑定</text>

  <!-- Table header -->
  <rect x="60" y="100" width="380" height="48" rx="8" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#c4b5fd" font-weight="700">对比维度</text>

  <rect x="454" y="100" width="340" height="48" rx="8" fill="#1a1040" stroke="#7c3aed" stroke-width="2"/>
  <text x="410" y="116" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28">🔥</text>
  <text x="624" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#a78bfa" font-weight="700">故事熔炉 StoryForge</text>

  <rect x="808" y="100" width="332" height="48" rx="8" fill="#1a0f2e" stroke="#4b5563"/>
  <text x="974" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#6b7280" font-weight="700">普通 AI 写作工具</text>

  <!-- Rows -->
  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">

    <!-- Row 1 -->
    <rect x="60" y="162" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="192" text-anchor="middle" font-size="14" fill="#94a3b8">提示词可见性</text>

    <rect x="454" y="162" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="186" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="186" font-size="13" fill="#6ee7b7" font-weight="600">System Prompt 完整可见</text>
    <text x="502" y="203" font-size="11.5" fill="#4ade80">User Template 带变量标注</text>

    <rect x="808" y="162" width="332" height="52" rx="6" fill="#2d0a0a" stroke="#7f1d1d"/>
    <text x="828" y="186" font-size="20" fill="#ef4444">❌</text>
    <text x="856" y="186" font-size="13" fill="#fca5a5">后台黑箱</text>
    <text x="856" y="203" font-size="11.5" fill="#f87171">用户无法查看或修改</text>

    <!-- Row 2 -->
    <rect x="60" y="227" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="257" text-anchor="middle" font-size="14" fill="#94a3b8">提示词自定义</text>

    <rect x="454" y="227" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="251" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="251" font-size="13" fill="#6ee7b7" font-weight="600">克隆→改参数/示例→设为激活</text>
    <text x="502" y="268" font-size="11.5" fill="#4ade80">导入/导出 JSON 分享</text>

    <rect x="808" y="227" width="332" height="52" rx="6" fill="#2d0a0a" stroke="#7f1d1d"/>
    <text x="828" y="251" font-size="20" fill="#ef4444">❌</text>
    <text x="856" y="251" font-size="13" fill="#fca5a5">无法修改</text>
    <text x="856" y="268" font-size="11.5" fill="#f87171">顶多调几个表面参数</text>

    <!-- Row 3 -->
    <rect x="60" y="292" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="322" text-anchor="middle" font-size="14" fill="#94a3b8">数据存储位置</text>

    <rect x="454" y="292" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="316" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="316" font-size="13" fill="#6ee7b7" font-weight="600">100% 本地（IndexedDB）</text>
    <text x="502" y="333" font-size="11.5" fill="#4ade80">API Key 存 localStorage，不经后端</text>

    <rect x="808" y="292" width="332" height="52" rx="6" fill="#78350f" stroke="#92400e" opacity="0.8"/>
    <text x="828" y="316" font-size="20" fill="#fbbf24">⚠️</text>
    <text x="856" y="316" font-size="13" fill="#fde68a">数据上传至厂商服务器</text>
    <text x="856" y="333" font-size="11.5" fill="#fcd34d">隐私和泄露风险</text>

    <!-- Row 4 -->
    <rect x="60" y="357" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="387" text-anchor="middle" font-size="14" fill="#94a3b8">AI 厂商选择</text>

    <rect x="454" y="357" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="381" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="381" font-size="13" fill="#6ee7b7" font-weight="600">11 家厂商任选，自带 API Key</text>
    <text x="502" y="398" font-size="11.5" fill="#4ade80">无供应商锁定，随时切换</text>

    <rect x="808" y="357" width="332" height="52" rx="6" fill="#2d0a0a" stroke="#7f1d1d"/>
    <text x="828" y="381" font-size="20" fill="#ef4444">❌</text>
    <text x="856" y="381" font-size="13" fill="#fca5a5">锁定单一后台模型</text>
    <text x="856" y="398" font-size="11.5" fill="#f87171">换工具就要迁移所有数据</text>

    <!-- Row 5 -->
    <rect x="60" y="422" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="452" text-anchor="middle" font-size="14" fill="#94a3b8">题材风格切换</text>

    <rect x="454" y="422" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="446" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="446" font-size="13" fill="#6ee7b7" font-weight="600">5 套题材包热切换（30 秒）</text>
    <text x="502" y="463" font-size="11.5" fill="#4ade80">仙侠/言情/现实/悬疑/通用</text>

    <rect x="808" y="422" width="332" height="52" rx="6" fill="#2d0a0a" stroke="#7f1d1d"/>
    <text x="828" y="446" font-size="20" fill="#ef4444">❌</text>
    <text x="856" y="446" font-size="13" fill="#fca5a5">风格固定，调整成本高</text>
    <text x="856" y="463" font-size="11.5" fill="#f87171">依赖用户手写提示词</text>

    <!-- Row 6 -->
    <rect x="60" y="487" width="380" height="52" rx="6" fill="#0f172a" stroke="#1e293b"/>
    <text x="250" y="517" text-anchor="middle" font-size="14" fill="#94a3b8">价格</text>

    <rect x="454" y="487" width="340" height="52" rx="6" fill="#052e16" stroke="#166534"/>
    <text x="474" y="511" font-size="20" fill="#10b981">✅</text>
    <text x="502" y="511" font-size="13" fill="#6ee7b7" font-weight="600">完全免费开源（MIT）</text>
    <text x="502" y="528" font-size="11.5" fill="#4ade80">只需支付你自己的 API 调用费</text>

    <rect x="808" y="487" width="332" height="52" rx="6" fill="#78350f" stroke="#92400e" opacity="0.8"/>
    <text x="828" y="511" font-size="20" fill="#fbbf24">💰</text>
    <text x="856" y="511" font-size="13" fill="#fde68a">月订阅 ¥xx ~ ¥xxx/月</text>
    <text x="856" y="528" font-size="11.5" fill="#fcd34d">功能越多越贵</text>

  </g>

  <!-- Bottom summary -->
  <rect x="60" y="557" width="1080" height="52" rx="10" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="600" y="579" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#c4b5fd" font-weight="600">🔥 故事熔炉 · 开源免费 · 提示词全透明 · 数据完全属于你</text>
  <text x="600" y="599" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#7c3aed">github.com/yuanbw2025/storyforge</text>

</svg>
