name: Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v3.6.0'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build web app
        run: |
          npm ci
          npm run build

      - name: Build Windows portable executable
        run: |
          rm -rf release packaging/desktop-server/web
          mkdir -p release packaging/desktop-server/web
          cp -R dist/. packaging/desktop-server/web/
          cd packaging/desktop-server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../../release/StoryForge-Windows-${RELEASE_TAG}.exe .

      - name: Create portable zip
        run: |
          mkdir -p release/StoryForge-Windows-Portable
          cp release/StoryForge-Windows-${RELEASE_TAG}.exe release/StoryForge-Windows-Portable/StoryForge.exe
          cp packaging/windows/README-Windows-Portable.txt release/StoryForge-Windows-Portable/
          cp README.md CHANGELOG.md release/StoryForge-Windows-Portable/
          cd release
          zip -r StoryForge-Windows-Portable-${RELEASE_TAG}.zip StoryForge-Windows-Portable
          sha256sum StoryForge-Windows-${RELEASE_TAG}.exe StoryForge-Windows-Portable-${RELEASE_TAG}.zip > SHA256SUMS.txt

      - name: Prepare release notes
        run: |
          cat > release/RELEASE-NOTES.md <<'EOF'
          ## StoryForge 故事熔炉

          本版本提供 Windows 免安装启动器：

          - `StoryForge-Windows-Portable-*.zip`：推荐普通用户下载，含 `StoryForge.exe` 和使用说明。
          - `StoryForge-Windows-*.exe`：单文件启动器，内嵌前端构建产物；双击后启动本地服务并打开浏览器。
          - `SHA256SUMS.txt`：校验文件完整性。

          使用前建议先在旧版本「数据管理」中导出 JSON 备份。

          普通用户不要下载 GitHub 自动生成的 `Source code.zip`，那是给开发者看的源码包。
          EOF

      - name: Ensure tag exists for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          args=()
          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              release/StoryForge-Windows-${RELEASE_TAG}.exe \
              release/StoryForge-Windows-Portable-${RELEASE_TAG}.zip \
              release/SHA256SUMS.txt \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              release/StoryForge-Windows-${RELEASE_TAG}.exe \
              release/StoryForge-Windows-Portable-${RELEASE_TAG}.zip \
              release/SHA256SUMS.txt \
              --title "StoryForge ${RELEASE_TAG}" \
              --notes-file release/RELEASE-NOTES.md \
              "${args[@]}"
          fi
