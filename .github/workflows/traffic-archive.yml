name: Traffic Archive

# 每天归档一次 GitHub 流量数据（clones / views）。
# GitHub traffic API 只保留最近 14 天，定时拉取并累加 CSV 才能得到建档以来的总量。
on:
  schedule:
    - cron: '17 2 * * *'   # 每天 UTC 02:17（错峰，避开整点拥堵）
  workflow_dispatch: {}     # 支持在 Actions 页面手动触发（首次验证用）

permissions:
  contents: write           # 允许 workflow 把归档结果 commit 回仓库

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive traffic data
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}   # 需自建 PAT（repo scope）存为该 Secret
        run: |
          python3 scripts/archive-traffic.py
          python3 scripts/archive-release-downloads.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic
          git diff --cached --quiet || git commit -m "chore(traffic): 归档 $(date -u +%F) 流量数据"
          git push
